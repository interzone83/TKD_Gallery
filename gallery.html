<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Gallery</title>
  <style>
    html,body{margin:0;padding:0;width:100%;height:100%;overflow:hidden;background:#f5f6f8;font-family:Arial,Roboto,Helvetica,sans-serif;-webkit-text-size-adjust:100%}
    .app{height:100vh;display:flex;flex-direction:column;background:#f5f6f8;color:#15191f}
    .status-bar{padding:calc(8px + env(safe-area-inset-top)) 18px 7px;display:flex;justify-content:space-between;align-items:center;font-size:12px;font-weight:700;color:#15191f;flex-shrink:0}
    .status-right{display:flex;align-items:center;gap:7px}.signal-bars{display:flex;align-items:end;gap:2px;height:11px}.signal-bars span{width:3px;background:currentColor;border-radius:2px}.signal-bars span:nth-child(1){height:3px}.signal-bars span:nth-child(2){height:6px}.signal-bars span:nth-child(3){height:8px}.signal-bars span:nth-child(4){height:11px}
    .battery{width:24px;height:11px;border:1.6px solid currentColor;border-radius:3px;position:relative;overflow:hidden}.battery::after{content:"";position:absolute;right:-4px;top:3px;width:3px;height:5px;background:currentColor;border-radius:0 2px 2px 0}.battery-fill{height:100%;width:84%;background:currentColor}
    .header{padding:16px 20px 12px;flex-shrink:0}.title{font-size:30px;line-height:1;font-weight:800;letter-spacing:-.04em}.subtitle{margin-top:7px;font-size:13px;font-weight:700;color:#6b7280}
    .gallery-scroll{flex:1;overflow-y:auto;padding:0 12px 28px;-webkit-overflow-scrolling:touch}.date-section{margin-top:18px}.date-title{font-size:14px;font-weight:800;color:#374151;margin:0 8px 9px}.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:4px}
    .thumb{position:relative;aspect-ratio:1/1;border:none;padding:0;overflow:hidden;background:#d1d5db;border-radius:4px;-webkit-tap-highlight-color:transparent}.thumb img{width:100%;height:100%;object-fit:cover;display:block;opacity:0;transition:opacity .2s ease}.thumb img.loaded{opacity:1}
    .viewer{position:fixed;inset:0;display:none;background:#05070a;z-index:99;overflow:hidden;touch-action:none}.viewer.open{display:block}
    .viewer-status{position:absolute;top:0;left:0;right:0;padding:calc(8px + env(safe-area-inset-top)) 18px 7px;display:flex;justify-content:space-between;align-items:center;font-size:12px;font-weight:700;color:rgba(244,247,251,.92);z-index:5;pointer-events:none}
    .viewer-top{position:absolute;top:calc(34px + env(safe-area-inset-top));left:0;right:0;padding:10px 14px;display:flex;justify-content:space-between;align-items:center;z-index:6;pointer-events:none}.viewer-info{color:rgba(244,247,251,.84);font-size:13px;font-weight:700;text-shadow:0 2px 8px rgba(0,0,0,.45)}.viewer-close{pointer-events:auto;width:42px;height:42px;border-radius:14px;border:none;background:rgba(38,49,61,.9);color:#f4f7fb;font-size:26px;line-height:1;font-weight:600}
    .viewer-image{position:absolute;top:50%;left:50%;max-width:100vw;max-height:100vh;transform:translate(-50%,-50%) scale(1);transform-origin:center center;user-select:none;-webkit-user-drag:none}
  </style>
</head>
<body>
  <div class="app">
    <div class="status-bar"><div id="statusTime">10:47</div><div class="status-right"><div class="signal-bars"><span></span><span></span><span></span><span></span></div><span id="statusSignal">5G</span><span id="statusBattery">84%</span><div class="battery"><div class="battery-fill" id="batteryFill"></div></div></div></div>
    <header class="header"><div class="title" id="galleryTitle">Gallery</div><div class="subtitle" id="gallerySubtitle">Recent photos</div></header>
    <main class="gallery-scroll" id="galleryScroll"></main>
  </div>
  <div class="viewer" id="viewer">
    <div class="viewer-status"><div id="viewerStatusTime">10:47</div><div class="status-right"><div class="signal-bars"><span></span><span></span><span></span><span></span></div><span id="viewerStatusSignal">5G</span><span id="viewerStatusBattery">84%</span><div class="battery"><div class="battery-fill" id="viewerBatteryFill"></div></div></div></div>
    <div class="viewer-top"><div class="viewer-info" id="viewerInfo"></div><button class="viewer-close" type="button" onclick="closeViewer()">×</button></div>
    <img class="viewer-image" id="viewerImage" alt="">
  </div>
  <script>
    let settings={},photos=[],currentIndex=0,scale=1,offsetX=0,offsetY=0,dragging=false,lastX=0,lastY=0,startX=0,startY=0,pinchStartDistance=0,pinchStartScale=1;
    async function start(){settings=await loadSettingsCsv();photos=await loadImagesCsv();applySettings();renderGallery();preloadImages();}
    async function loadSettingsCsv(){const text=await fetch("gallery-settings.csv?cache="+Date.now()).then(r=>r.text());const rows=parseCsv(text);const out={};rows.slice(1).forEach(r=>{if(r[0])out[r[0].trim()]=(r[1]||"").trim()});return out}
    async function loadImagesCsv(){const text=await fetch("gallery-images.csv?cache="+Date.now()).then(r=>r.text());const rows=parseCsv(text);const h=rows[0].map(x=>x.trim());const items=[];rows.slice(1).forEach(r=>{const item={};h.forEach((k,i)=>item[k]=r[i]||"");if(String(item.Visible||"TRUE").toUpperCase()!=="FALSE"&&item.ImageURL)items.push(item)});items.sort((a,b)=>new Date(b.DateTaken)-new Date(a.DateTaken));return items}
    function parseCsv(text){const rows=[];let row=[],v="",q=false;for(let i=0;i<text.length;i++){const c=text[i],n=text[i+1];if(c=='"'&&q&&n=='"'){v+='"';i++}else if(c=='"'){q=!q}else if(c==","&&!q){row.push(v);v=""}else if((c=="\n"||c=="\r")&&!q){if(c=="\r"&&n=="\n")i++;row.push(v);if(row.some(cell=>cell.trim()!==""))rows.push(row);row=[];v=""}else v+=c}row.push(v);if(row.some(cell=>cell.trim()!==""))rows.push(row);return rows}
    function applySettings(){const t=settings["Display Time"]||"10:47",b=clamp(parseInt(settings["Battery %"]||"84",10),0,100),s=settings["Signal"]||"5G";galleryTitle.textContent=settings["Gallery Title"]||"Gallery";gallerySubtitle.textContent=settings["Gallery Subtitle"]||"Recent photos";statusTime.textContent=t;viewerStatusTime.textContent=t;statusSignal.textContent=s;viewerStatusSignal.textContent=s;statusBattery.textContent=b+"%";viewerStatusBattery.textContent=b+"%";batteryFill.style.width=b+"%";viewerBatteryFill.style.width=b+"%"}
    function renderGallery(){const root=galleryScroll,grouped={};photos.forEach((p,i)=>{const d=formatDateGroup(p.DateTaken);(grouped[d]=grouped[d]||[]).push({p,i})});root.innerHTML=Object.keys(grouped).map(d=>`<section class="date-section"><h2 class="date-title">${escapeHtml(d)}</h2><div class="grid">${grouped[d].map(({p,i})=>`<button class="thumb" type="button" onclick="openViewer(${i})"><img src="${escapeHtml(p.ImageURL)}" onload="this.classList.add('loaded')"></button>`).join("")}</div></section>`).join("")}
    function preloadImages(){photos.forEach(p=>{const img=new Image();img.src=p.ImageURL})}
    function openViewer(i){currentIndex=i;resetTransform();showCurrentPhoto();viewer.classList.add("open")}
    function closeViewer(){viewer.classList.remove("open");viewerImage.src=""}
    function showCurrentPhoto(){const p=photos[currentIndex];viewerImage.src=p.ImageURL;viewerInfo.textContent=formatViewerInfo(p);resetTransform()}
    function nextPhoto(){if(currentIndex<photos.length-1){currentIndex++;showCurrentPhoto()}}
    function previousPhoto(){if(currentIndex>0){currentIndex--;showCurrentPhoto()}}
    function resetTransform(){scale=1;offsetX=0;offsetY=0;updateTransform()}
    function updateTransform(){viewerImage.style.transform=`translate(calc(-50% + ${offsetX}px), calc(-50% + ${offsetY}px)) scale(${scale})`}
    viewer.addEventListener("touchstart",e=>{if(e.touches.length===1){dragging=true;startX=lastX=e.touches[0].clientX;startY=lastY=e.touches[0].clientY}if(e.touches.length===2){dragging=false;pinchStartDistance=getTouchDistance(e.touches);pinchStartScale=scale}},{passive:false});
    viewer.addEventListener("touchmove",e=>{e.preventDefault();if(e.touches.length===1&&dragging){const x=e.touches[0].clientX,y=e.touches[0].clientY;if(scale>1.02){offsetX+=x-lastX;offsetY+=y-lastY;updateTransform()}lastX=x;lastY=y}if(e.touches.length===2){const d=getTouchDistance(e.touches);scale=Math.max(1,Math.min(5,pinchStartScale*(d/pinchStartDistance)));updateTransform()}},{passive:false});
    viewer.addEventListener("touchend",()=>{if(!dragging)return;const dx=lastX-startX,dy=lastY-startY;if(scale<=1.02&&Math.abs(dx)>55&&Math.abs(dx)>Math.abs(dy)){if(dx<0)nextPhoto();else previousPhoto()}dragging=false});
    viewer.addEventListener("wheel",e=>{e.preventDefault();scale=Math.max(1,Math.min(5,scale+(e.deltaY<0?.14:-.14)));updateTransform()},{passive:false});
    viewer.addEventListener("mousedown",e=>{dragging=true;startX=lastX=e.clientX;startY=lastY=e.clientY});
    window.addEventListener("mousemove",e=>{if(!dragging)return;if(scale>1.02){offsetX+=e.clientX-lastX;offsetY+=e.clientY-lastY;updateTransform()}lastX=e.clientX;lastY=e.clientY});
    window.addEventListener("mouseup",()=>{if(!dragging)return;const dx=lastX-startX,dy=lastY-startY;if(scale<=1.02&&Math.abs(dx)>55&&Math.abs(dx)>Math.abs(dy)){if(dx<0)nextPhoto();else previousPhoto()}dragging=false});
    function getTouchDistance(t){const dx=t[0].clientX-t[1].clientX,dy=t[0].clientY-t[1].clientY;return Math.sqrt(dx*dx+dy*dy)}
    function formatDateGroup(x){const d=new Date(x);if(isNaN(d.getTime()))return x||"Photos";return d.toLocaleDateString([],{weekday:"long",day:"numeric",month:"long",year:"numeric"})}
    function formatViewerInfo(p){const d=new Date(p.DateTaken),c=p.Caption||"";if(isNaN(d.getTime()))return c;const dp=d.toLocaleDateString([],{day:"numeric",month:"short",year:"numeric"}),tp=d.toLocaleTimeString([],{hour:"2-digit",minute:"2-digit",hour12:false});return c?`${dp} ${tp} · ${c}`:`${dp} ${tp}`}
    function escapeHtml(x){return String(x||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;")}
    function clamp(v,min,max){if(isNaN(v))return min;return Math.max(min,Math.min(max,v))}
    start();
  </script>
</body>
</html>
