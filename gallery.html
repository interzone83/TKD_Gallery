<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Gallery</title>
  <style>
    html,body{margin:0;padding:0;width:100%;height:100%;overflow:hidden;background:#f4f6f8;font-family:Arial,Roboto,Helvetica,sans-serif;-webkit-text-size-adjust:100%;color:#18222d}.app{height:100vh;display:flex;flex-direction:column;background:#f4f6f8}.status-bar{padding:calc(8px + env(safe-area-inset-top)) 18px 7px;display:flex;justify-content:space-between;align-items:center;font-size:12px;font-weight:700;color:#18222d;background:#f4f6f8;flex-shrink:0}.status-right{display:flex;align-items:center;gap:7px}.signal-bars{display:flex;align-items:end;gap:2px;height:11px}.signal-bars span{width:3px;background:currentColor;border-radius:2px}.signal-bars span:nth-child(1){height:3px}.signal-bars span:nth-child(2){height:6px}.signal-bars span:nth-child(3){height:8px}.signal-bars span:nth-child(4){height:11px}.battery{width:24px;height:11px;border:1.6px solid currentColor;border-radius:3px;position:relative;overflow:hidden}.battery:after{content:"";position:absolute;right:-4px;top:3px;width:3px;height:5px;background:currentColor;border-radius:0 2px 2px 0}.battery-fill{height:100%;width:43%;background:currentColor}.app-header{padding:16px 18px 12px;background:#f4f6f8;border-bottom:1px solid rgba(24,34,45,.08);flex-shrink:0}.app-title{font-size:30px;font-weight:900;letter-spacing:-.04em}.app-subtitle{font-size:13px;font-weight:800;text-transform:uppercase;letter-spacing:.14em;color:#687584;margin-top:3px}.gallery{flex:1;overflow-y:auto;padding:14px 12px 28px;-webkit-overflow-scrolling:touch}.date-section{margin-bottom:24px}.date-title{font-size:15px;font-weight:900;color:#18222d;margin:10px 4px 10px}.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:4px}.thumb{aspect-ratio:1/1;background:#dde3ea;border:none;padding:0;overflow:hidden;border-radius:8px}.thumb img{width:100%;height:100%;object-fit:cover;display:block}.viewer{position:fixed;inset:0;background:#05070a;z-index:999;display:none;overflow:hidden;touch-action:none}.viewer.open{display:block}.viewer-top{position:absolute;top:calc(8px + env(safe-area-inset-top));left:0;right:0;height:48px;display:flex;justify-content:space-between;align-items:center;padding:0 14px;z-index:5;color:white}.viewer-title{font-size:13px;font-weight:800;text-transform:uppercase;letter-spacing:.12em;color:rgba(255,255,255,.7)}.viewer-close{width:42px;height:42px;border-radius:14px;border:none;background:rgba(38,49,61,.9);color:#f4f7fb;font-size:26px;line-height:1;font-weight:600}.viewer-image{position:absolute;top:50%;left:50%;max-width:94vw;max-height:86vh;transform:translate(-50%,-50%) scale(1);transform-origin:center center;user-select:none;-webkit-user-drag:none;border-radius:8px}.loading{padding:20px;font-weight:700;color:#687584}
  </style>
</head>
<body>
  <div class="app">
    <div class="status-bar"><div id="displayTime">10:47</div><div class="status-right"><div class="signal-bars"><span></span><span></span><span></span><span></span></div><span>5G</span><span>43%</span><div class="battery"><div class="battery-fill"></div></div></div></div>
    <div class="app-header"><div class="app-title">Gallery</div><div class="app-subtitle">Recent photos</div></div>
    <div class="gallery" id="gallery"><div class="loading">Loading gallery…</div></div>
  </div>
  <div class="viewer" id="viewer"><div class="viewer-top"><div class="viewer-title" id="viewerTitle">Photo</div><button class="viewer-close" onclick="closeViewer()">×</button></div><img class="viewer-image" id="viewerImage" src="" alt=""></div>
  <script>
    let photos=[];const gallery=document.getElementById('gallery'),viewer=document.getElementById('viewer'),viewerImage=document.getElementById('viewerImage'),viewerTitle=document.getElementById('viewerTitle');let scale=1,x=0,y=0,dragging=false,lastX=0,lastY=0,pinchStartDistance=0,pinchStartScale=1;
    async function loadGallery(){const res=await fetch('gallery.csv?cache=' + Date.now());const text=await res.text();photos=parseCsv(text).filter(p=>String(p.Visible||'TRUE').toUpperCase()==='TRUE');renderGallery();preloadImages()}
    function parseCsv(text){const lines=text.trim().split(/\r?\n/);const headers=splitCsvLine(lines.shift());return lines.map(line=>{const vals=splitCsvLine(line);const o={};headers.forEach((h,i)=>o[h]=vals[i]||'');return o})}
    function splitCsvLine(line){const out=[];let cur='',q=false;for(let i=0;i<line.length;i++){const c=line[i];if(c==='"'){q=!q;continue}if(c===','&&!q){out.push(cur);cur='';continue}cur+=c}out.push(cur);return out}
    function renderGallery(){const grouped={};photos.forEach(p=>{const d=p.Date||'Undated';if(!grouped[d])grouped[d]=[];grouped[d].push(p)});gallery.innerHTML=Object.keys(grouped).map(date=>`<section class="date-section"><div class="date-title">${escapeHtml(date)}</div><div class="grid">${grouped[date].map(p=>`<button class="thumb" onclick="openViewer('${escapeAttr(p['Image URL'])}','${escapeAttr(p.Caption||date)}')"><img src="${escapeAttr(p['Image URL'])}" loading="eager"></button>`).join('')}</div></section>`).join('')}
    function preloadImages(){photos.forEach(p=>{const img=new Image();img.src=p['Image URL']})}
    function openViewer(src,title){viewerImage.src=src;viewerTitle.textContent=title||'Photo';scale=1;x=0;y=0;updateTransform();viewer.classList.add('open')}
    function closeViewer(){viewer.classList.remove('open');viewerImage.src=''}function updateTransform(){viewerImage.style.transform=`translate(calc(-50% + ${x}px), calc(-50% + ${y}px)) scale(${scale})`}
    viewer.addEventListener('wheel',e=>{e.preventDefault();scale=Math.max(1,Math.min(6,scale+(e.deltaY<0?.12:-.12)));updateTransform()},{passive:false});viewer.addEventListener('mousedown',e=>{dragging=true;lastX=e.clientX;lastY=e.clientY});window.addEventListener('mousemove',e=>{if(!dragging)return;x+=e.clientX-lastX;y+=e.clientY-lastY;lastX=e.clientX;lastY=e.clientY;updateTransform()});window.addEventListener('mouseup',()=>dragging=false);viewer.addEventListener('touchstart',e=>{if(e.touches.length===1){dragging=true;lastX=e.touches[0].clientX;lastY=e.touches[0].clientY}if(e.touches.length===2){dragging=false;pinchStartDistance=getTouchDistance(e.touches);pinchStartScale=scale}},{passive:false});viewer.addEventListener('touchmove',e=>{e.preventDefault();if(e.touches.length===1&&dragging){x+=e.touches[0].clientX-lastX;y+=e.touches[0].clientY-lastY;lastX=e.touches[0].clientX;lastY=e.touches[0].clientY;updateTransform()}if(e.touches.length===2){const d=getTouchDistance(e.touches);scale=Math.max(1,Math.min(6,pinchStartScale*(d/pinchStartDistance)));updateTransform()}},{passive:false});viewer.addEventListener('touchend',()=>dragging=false);function getTouchDistance(t){const dx=t[0].clientX-t[1].clientX,dy=t[0].clientY-t[1].clientY;return Math.sqrt(dx*dx+dy*dy)}
    function escapeHtml(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}function escapeAttr(s){return escapeHtml(s).replace(/'/g,'&#39;')}function updateTime(){const d=new Date();document.getElementById('displayTime').textContent=d.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit',hour12:false})}updateTime();setInterval(updateTime,60000);loadGallery().catch(e=>{gallery.innerHTML='<div class="loading">Could not load gallery.csv</div>';console.log(e)})
  </script>
</body>
</html>
